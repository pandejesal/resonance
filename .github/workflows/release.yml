name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.1.0)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Copy Frontend to Static
        run: xcopy /E /I /Q frontend\dist static

      - name: Build Backend
        run: cargo build --release -p resonance-backend

      - name: Package Portable
        run: |
          mkdir release
          copy target\release\resonance-backend.exe release\
          xcopy /E /I /Q static release\static
          xcopy /E /I /Q backend\migrations release\migrations
          copy scripts\install-windows.ps1 release\
          copy VERSION release\
          Compress-Archive -Path release\* -DestinationPath resonance-windows-x64.zip

      - name: Build Installer
        run: |
          mkdir installer_output
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\windows.iss

      - name: Upload Portable
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: resonance-windows-x64.zip

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/installer_output/resonance-*-setup.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev libfuse2

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Copy Frontend to Static
        run: cp -r frontend/dist static

      - name: Build Backend
        run: cargo build --release -p resonance-backend

      - name: Package Portable
        run: |
          mkdir -p release
          cp target/release/resonance-backend release/
          cp -r static release/static
          cp -r backend/migrations release/migrations
          cp scripts/install-linux.sh release/
          cp VERSION release/
          tar -czf resonance-linux-x64.tar.gz -C release .

      - name: Build AppImage
        run: |
          chmod +x installer/build-appimage.sh
          bash installer/build-appimage.sh

      - name: Upload Portable
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: resonance-linux-x64.tar.gz

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: "*-x86_64.AppImage"

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Copy Frontend to Static
        run: cp -r frontend/dist static

      - name: Build Backend
        run: cargo build --release -p resonance-backend

      - name: Package Portable
        run: |
          mkdir -p release
          cp target/release/resonance-backend release/
          cp -r static release/static
          cp -r backend/migrations release/migrations
          cp scripts/install-macos.sh release/
          cp VERSION release/
          tar -czf resonance-macos-x64.tar.gz -C release .

      - name: Build DMG
        run: |
          mkdir -p release
          chmod +x installer/build-dmg.sh
          bash installer/build-dmg.sh

      - name: Upload Portable
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: resonance-macos-x64.tar.gz

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: resonance-*-macos.dmg

  build-android-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust Android Target
        run: |
          rustup target add aarch64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;26.1.10909125"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: android-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: android-cargo-

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Build Backend for Android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
        run: |
          NDK_BIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin
          export CC_aarch64_linux_android=$NDK_BIN/aarch64-linux-android34-clang
          export AR_aarch64_linux_android=$NDK_BIN/llvm-ar
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$NDK_BIN/aarch64-linux-android34-clang
          export PKG_CONFIG_PATH=""
          export OPENSSL_DIR=""
          cargo build --release --target aarch64-linux-android -p resonance-backend

      - name: Prepare Android Assets
        run: |
          mkdir -p frontend/android/app/src/main/assets
          cp target/aarch64-linux-android/release/resonance-backend frontend/android/app/src/main/assets/resonance-backend
          cp -r frontend/dist frontend/android/app/src/main/assets/static
          cp -r backend/migrations frontend/android/app/src/main/assets/migrations
          chmod +x frontend/android/app/src/main/assets/resonance-backend

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android APK
        run: |
          cd frontend/android
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk

  build-ios-ipa:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust iOS Target
        run: rustup target add aarch64-apple-ios

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ios-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ios-cargo-

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Build Backend for iOS
        run: |
          IOS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          export SDKROOT="$IOS_SDK"
          export IPHONEOS_DEPLOYMENT_TARGET="15.0"
          export CC_aarch64_apple_ios="$(xcrun --sdk iphoneos -find clang)"
          export AR_aarch64_apple_ios="$(xcrun --sdk iphoneos -find ar)"
          cargo build --release --target aarch64-apple-ios -p resonance-backend

      - name: Prepare iOS Build Assets
        run: |
          mkdir -p frontend/ios/App/backend
          cp target/aarch64-apple-ios/release/resonance-backend frontend/ios/App/backend/
          cp -r frontend/dist frontend/ios/App/backend/static
          cp -r backend/migrations frontend/ios/App/backend/migrations

      - name: Generate Xcode Project
        run: |
          cd frontend/ios/App
          xcodegen generate

      - name: Build iOS Archive
        run: |
          cd frontend/ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme Resonance \
            -configuration Release \
            -archivePath build/Resonance.xcarchive \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            archive

      - name: Export Unsigned IPA
        run: |
          cd frontend/ios/App
          mkdir -p build/ipa
          xcodebuild \
            -exportArchive \
            -archivePath build/Resonance.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: frontend/ios/App/build/ipa/*.ipa

  release:
    needs: [build-windows, build-linux, build-macos, build-android-apk, build-ios-ipa]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List Artifacts
        run: find artifacts -type f

      - name: Determine Tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Resonance ${{ steps.tag.outputs.tag }}
          body: |
            ## Resonance ${{ steps.tag.outputs.tag }}

            A self-hosted music archival system with bit-perfect playback.

            ### Native Installers (Recommended)

            | Platform | File | Description |
            |----------|------|-------------|
            | **Windows** | `resonance-*-setup.exe` | Double-click installer with wizard |
            | **macOS** | `resonance-*-macos.dmg` | Drag-to-Applications disk image |
            | **Linux** | `Resonance-*.AppImage` | Universal portable app (chmod +x, run) |
            | **Android** | `resonance-*-android.apk` | Install directly on Android device |
            | **iOS** | `resonance-*-ios.ipa` | Unsigned IPA (re-sign with AltStore/Sideloadly) |

            ### Portable Downloads

            | Platform | File | Description |
            |----------|------|-------------|
            | **Windows** | `resonance-windows-x64.zip` | Extract and run `install-windows.ps1` |
            | **Linux** | `resonance-linux-x64.tar.gz` | Extract and run `bash install-linux.sh` |
            | **macOS** | `resonance-macos-x64.tar.gz` | Extract and run `bash install-macos.sh` |

            ### Docker
            ```bash
            git clone https://github.com/pandejesal/resonance.git
            cd resonance
            docker compose -f docker/docker-compose.yml up -d
            ```
            Open http://localhost:8080

            ### Features
            - Bit-perfect audio playback with Web Audio API
            - 10-band equalizer with presets
            - Gapless playback and crossfade
            - Scrobbling (Last.fm, ListenBrainz)
            - Synced lyrics (LRCLIB)
            - Import from Spotify, YouTube Music, Apple Music, SoundCloud
            - Auto-updater
            - Dark/Light/AMOLED themes
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.apk
            artifacts/**/*.ipa
          draft: false
          prerelease: false
